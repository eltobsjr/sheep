<svg width="100" height="112" viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg">
  <!-- Puffs — 6 circles forming the wool body -->
  <circle cx="50" cy="68" r="20" fill="currentColor"/>
  <circle cx="33" cy="65" r="15" fill="currentColor"/>
  <circle cx="67" cy="65" r="15" fill="currentColor"/>
  <circle cx="40" cy="50" r="11" fill="currentColor"/>
  <circle cx="60" cy="51" r="13" fill="currentColor"/>
  <circle cx="50" cy="47" r="12" fill="currentColor"/>
  <!-- Head -->
  <ellipse cx="50" cy="29" rx="12" ry="13" fill="currentColor"/>
  <!-- Ears -->
  <ellipse cx="38" cy="19" rx="6" ry="8" fill="currentColor" transform="rotate(-22 38 19)"/>
  <ellipse cx="62" cy="19" rx="6" ry="8" fill="currentColor" transform="rotate(22 62 19)"/>
  <!-- Legs -->
  <rect x="28" y="85" width="9" height="22" rx="4.5" fill="currentColor"/>
  <rect x="40" y="86" width="9" height="22" rx="4.5" fill="currentColor"/>
  <rect x="51" y="86" width="9" height="22" rx="4.5" fill="currentColor"/>
  <rect x="63" y="85" width="9" height="22" rx="4.5" fill="currentColor"/>
  <!-- Eyes -->
  <circle cx="45" cy="26" r="2.5" fill="#FAFAFA"/>
  <circle cx="55" cy="26" r="2.5" fill="#FAFAFA"/>
  <!-- Mouth -->
  <ellipse cx="50" cy="33" rx="3.5" ry="2.5" fill="#FAFAFA" opacity=".55"/>
</svg>
